<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mon espace · Chloé Domicile</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Mulish:wght@400;500;600;700;800&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--cream:#FBF5F0;--card:#fff;--line:#EADBD0;--coral:#D97A5E;--coral-deep:#C25A45;--coral-tint:#F7E2D8;--forest:#21433B;--ink:#2B2420;--muted:#6E635C;--ok:#2E7D5B;--ok-tint:#DCEFE5;--warn:#B5742A;--warn-tint:#F7E7CF}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Mulish',system-ui,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px 60px}
  h1,h2,h3{font-family:'Fraunces',serif}
  .brand{font-family:'Quicksand',sans-serif;font-weight:700;color:var(--forest)}

  #login{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  #login .brand{font-size:1.9rem;margin-bottom:4px}
  #login .sub{color:var(--muted);margin-bottom:26px}
  .box{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;width:100%;max-width:390px;text-align:left;box-shadow:0 14px 34px -24px rgba(43,36,32,.5)}
  label{display:block;font-size:.76rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;margin:0 0 6px 2px}
  input{width:100%;font-family:inherit;font-size:1rem;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fff;margin-bottom:13px}
  input:focus{outline:none;border-color:var(--coral)}
  .btn{width:100%;background:var(--forest);color:#fff;font-family:inherit;font-weight:800;font-size:1rem;padding:13px;border:none;border-radius:12px;cursor:pointer}
  .btn.alt{background:var(--coral)}
  .btn:disabled{opacity:.5}
  .sep{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:.82rem;margin:16px 0}
  .sep::before,.sep::after{content:"";flex:1;height:1px;background:var(--line)}
  .small{font-size:.85rem;color:var(--muted);text-align:center;margin-top:12px}
  .link{background:none;border:none;color:var(--coral-deep);font-weight:700;font-family:inherit;cursor:pointer;font-size:.9rem}
  .msg{font-size:.9rem;margin-top:10px;min-height:1.1em}
  .msg.err{color:var(--coral-deep)} .msg.ok{color:var(--ok)}

  #app{display:none}
  header{background:var(--forest);color:#fff;padding:13px 0}
  header .wrap{padding-bottom:0;display:flex;align-items:center;justify-content:space-between}
  header .brand{color:#fff;font-size:1.2rem}
  header .out{background:rgba(255,255,255,.14);border:none;color:#fff;font-family:inherit;font-weight:700;font-size:.82rem;padding:8px 12px;border-radius:9px;cursor:pointer}
  .hi{font-family:'Fraunces',serif;font-size:1.5rem;color:var(--forest);margin:20px 0 4px}
  .section{margin-top:22px}.section h2{font-size:1.1rem;color:var(--forest);margin-bottom:10px}
  .item{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px;margin-bottom:11px}
  .item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
  .item .who{font-weight:700;font-size:1.05rem}
  .badge{font-size:.72rem;font-weight:800;padding:3px 9px;border-radius:999px;margin-right:5px}
  .b-proche{background:#D8E5E0;color:var(--forest)} .b-enfants{background:var(--coral-tint);color:var(--coral-deep)}
  .b-ok{background:var(--ok-tint);color:var(--ok)} .b-new{background:var(--coral);color:#fff} .b-wait{background:var(--warn-tint);color:var(--warn)}
  .meta{font-size:.92rem;color:var(--muted);line-height:1.5;margin-top:4px}
  .go{display:inline-block;margin-top:10px;background:var(--forest);color:#fff;text-decoration:none;font-weight:700;padding:10px 15px;border-radius:10px;font-size:.9rem}
  .empty{color:var(--muted);font-size:.95rem;background:#fff;border:1px dashed var(--line);border-radius:13px;padding:18px;text-align:center}
  .loading{text-align:center;color:var(--muted);padding:30px}
.stat{border-radius:16px;padding:14px 16px;margin-bottom:16px;font-size:.92rem;line-height:1.4}
.stat .t{font-weight:800;font-size:1.04rem;display:block;margin-bottom:3px}
.stat.ok{background:#eaf3ee;border:1.5px solid #bcdcc9;color:var(--forest)}
.stat.warn{background:#fdeee9;border:1.5px solid #f2cdbf;color:#a8492b}
.todo{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:8px}
.todo .row{display:flex;align-items:center;gap:11px;padding:12px 13px;border-bottom:1px solid var(--line)}
.todo .row:last-child{border-bottom:none}
.todo .row .ic{font-size:1.15rem;flex:none}
.todo .row .lab{flex:1;font-size:.9rem;line-height:1.3}
.todo .row a,.todo .row button{flex:none;font-size:.8rem;font-weight:700;color:#fff;background:var(--coral);border:none;border-radius:9px;padding:8px 12px;text-decoration:none;cursor:pointer;font-family:inherit}
.gaincard{background:var(--forest);color:#fff;border-radius:16px;padding:16px;margin-bottom:16px}
.lockwrap{position:relative}
.lockwrap .blur{filter:blur(5px);pointer-events:none;user-select:none}
.lockwrap .lockmsg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;background:rgba(251,245,240,.6);border-radius:14px;padding:16px}
.lockwrap .lockmsg .em{font-size:1.7rem}
details.prof{background:#fff;border:1px solid var(--line);border-radius:14px;padding:2px 14px;margin-bottom:16px}
details.prof>summary{cursor:pointer;font-weight:800;padding:13px 0;list-style:none;outline:none}
details.prof>summary::-webkit-details-marker{display:none}
details.prof>summary::after{content:'⌄';float:right;color:var(--muted);font-weight:700}
details.prof[open]>summary::after{content:'⌃'}
.btn.ghost{background:#fff;color:var(--forest);border:1.5px solid var(--line)}
.steps{display:flex;margin:0 0 16px}
.steps .s{flex:1;text-align:center;font-size:.64rem;color:var(--muted);position:relative;line-height:1.2}
.steps .s .dot{width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid var(--line);margin:0 auto 5px;position:relative;z-index:1}
.steps .s::before{content:'';position:absolute;top:7px;left:-50%;width:100%;height:2px;background:var(--line);z-index:0}
.steps .s:first-child::before{display:none}
.steps .s.done .dot,.steps .s.done::before{background:var(--forest);border-color:var(--forest)}
.steps .s.cur .dot{background:var(--coral);border-color:var(--coral)}
.steps .s.cur{color:var(--coral);font-weight:800}
.steps .s.done{color:var(--forest)}
.day{margin-bottom:8px}
.day-n{font-weight:800;color:var(--forest);font-size:.9rem;margin-bottom:3px}
.slot{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 11px;margin-bottom:5px;font-size:.92rem}
.cre{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:6px;font-size:.94rem}
.cre button{background:none;border:none;color:var(--coral);font-size:1.05rem;cursor:pointer;padding:0 4px}
.dispo-add{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.dispo-add select,.dispo-add input{font-family:inherit;font-size:.92rem;padding:9px;border:1.5px solid var(--line);border-radius:10px;background:#fff}
.dispo-add select{flex:1;min-width:104px}
.dispo-add input{width:96px}
.dispo-add button{background:var(--forest);color:#fff;border:none;border-radius:10px;padding:9px 13px;font-family:inherit;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div id="login">
  <img src="icon-512.png" alt="Chloé Domicile" style="width:80px;height:80px;display:block;margin:0 auto 8px;border-radius:20px">
  <div class="brand">Chloé Domicile</div>
  <div class="sub" id="authSub">Connexion</div>
  <div class="box">
    <label>Votre email</label>
    <input id="email" type="email" autocomplete="email" placeholder="vous@exemple.fr">
    <button class="btn alt" id="magicBtn" onclick="magicLink()">📩 Recevoir un lien de connexion</button>
    <div class="sep" id="pwSep">ou avec un mot de passe</div>
    <input id="pwd" type="password" autocomplete="current-password" placeholder="Mot de passe">
    <button class="btn" id="pwBtn" onclick="pwSubmit()">Se connecter</button>
    <div class="small" id="forgotLink" style="margin-top:8px"><button class="link" onclick="forgotPassword()">Mot de passe oublié ?</button></div>
    <div class="small" id="authToggle"></div>
    <div class="msg" id="msg"></div>
  </div>
  <div class="small" style="margin-top:14px;text-align:center"><a href="index.html" style="color:var(--forest);text-decoration:none">← Retour à l'accueil</a></div>
</div>

<div id="app">
  <header><div class="wrap"><a href="index.html" style="text-decoration:none"><span class="brand">Chloé Domicile</span></a><button class="out" onclick="logout()">Déconnexion</button></div></header>
  <div class="wrap">
    <div class="hi" id="hi">Bonjour 👋</div>
    <div id="body"><div class="loading">Chargement…</div></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://tiappxjyhysezrbssuiz.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpYXBweGp5aHlzZXpyYnNzdWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDA5NTcsImV4cCI6MjA5NzAxNjk1N30.5sWtB--nPRrbRlybEPuOWbXDQNfTuhMSu56xozbJ3fY';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
const MOIS=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const JOURS=['','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
function fmtH(t){if(!t)return'';const p=t.split(':');return parseInt(p[0],10)+'h'+(p[1]&&p[1]!=='00'?p[1]:'');}
function planSemaine(creneaux, withName){
  if(!creneaux||!creneaux.length) return '<div class="empty">Aucun créneau pour l\'instant. Chloé l\'organise avec vous.</div>';
  const byDay={};
  creneaux.slice().sort((a,b)=>(a.jour-b.jour)||a.debut.localeCompare(b.debut)).forEach(c=>{(byDay[c.jour]=byDay[c.jour]||[]).push(c);});
  let h='';
  for(let j=1;j<=7;j++){ if(!byDay[j])continue;
    h+='<div class="day"><div class="day-n">'+JOURS[j]+'</div>'+byDay[j].map(c=>'<div class="slot">🕘 '+fmtH(c.debut)+'–'+fmtH(c.fin)+(withName&&c._name?' · '+c._name:'')+'</div>').join('')+'</div>';
  }
  return h;
}
let myInterv=null;
function setMsg(t,ok){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+(ok?'ok':'err');}
function fmtMin(min){const h=Math.floor(min/60),m=min%60;return h+'h'+(m?String(m).padStart(2,'0'):'');}

async function magicLink(){
  const email=document.getElementById('email').value.trim();
  if(!email){setMsg('Entrez votre email.');return;}
  const b=document.getElementById('magicBtn');b.disabled=true;b.textContent='Envoi…';
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+location.pathname}});
  b.disabled=false;b.textContent='📩 Recevoir un lien de connexion';
  if(error){setMsg(error.message);return;}
  setMsg('Lien envoyé ! Ouvrez votre boîte mail et cliquez sur le lien.',true);
}
async function pwLogin(){
  const email=document.getElementById('email').value.trim(), pwd=document.getElementById('pwd').value;
  if(!email||!pwd){setMsg('Email et mot de passe requis.');return;}
  const {error}=await sb.auth.signInWithPassword({email,password:pwd});
  if(error){
    setAuthMode('signup');
    document.getElementById('email').value=email; document.getElementById('pwd').value=pwd;
    setMsg('Pas encore de compte avec cet email ? Choisissez un mot de passe (6 caractères min.) puis touchez « Créer mon compte ». (Si vous avez déjà un compte, vérifiez votre mot de passe.)');
    return;
  }
  enter();
}
async function pwSignup(){
  const email=document.getElementById('email').value.trim(), pwd=document.getElementById('pwd').value;
  if(!email||!pwd){setMsg('Entrez un email et choisissez un mot de passe.');return;}
  if(pwd.length<6){setMsg('Le mot de passe doit faire au moins 6 caractères.');return;}
  const {data,error}=await sb.auth.signUp({email,password:pwd,options:{emailRedirectTo:location.origin+location.pathname}});
  if(error){setMsg(error.message);return;}
  if(data.user && data.user.identities && data.user.identities.length===0){ setMsg('Un compte existe déjà avec cet email. Connectez-vous ci-dessous.'); setAuthMode('login'); return; }
  if(data.session){enter();} else {setMsg('Compte créé ! Vérifiez vos emails pour confirmer, puis connectez-vous.',true);}
}
let authMode='login';
function setAuthMode(m){
  authMode=m;
  document.getElementById('authSub').textContent   = m==='login'?'Connexion':'Créer mon compte';
  document.getElementById('pwBtn').textContent      = m==='login'?'Se connecter':'Créer mon compte';
  document.getElementById('pwd').setAttribute('autocomplete', m==='login'?'current-password':'new-password');
  document.getElementById('pwSep').textContent      = m==='login'?'ou avec un mot de passe':'ou choisissez un mot de passe';
  document.getElementById('authToggle').innerHTML   = m==='login'
    ? 'Première visite&nbsp;? <button class="link" onclick="setAuthMode(\'signup\')">Créer mon compte</button>'
    : 'Déjà inscrit·e&nbsp;? <button class="link" onclick="setAuthMode(\'login\')">Se connecter</button>';
  document.getElementById('msg').textContent='';
  const fl=document.getElementById('forgotLink'); if(fl) fl.style.display=(m==='login')?'':'none';
}
async function forgotPassword(){
  const email=document.getElementById('email').value.trim();
  if(!email){setMsg('Entrez d\'abord votre email ci-dessus, puis retouchez « Mot de passe oublié ? ».');return;}
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname});
  if(error){setMsg(error.message);return;}
  setMsg('Email envoyé ! Ouvrez votre boîte mail et cliquez sur le lien pour choisir un nouveau mot de passe.',true);
}
function pwSubmit(){ return authMode==='login'?pwLogin():pwSignup(); }
setAuthMode('login');
const _params=new URLSearchParams(location.search);
let urlRole=_params.get('role');
(()=>{ const em=_params.get('email'); if(em){ const f=document.getElementById('email'); if(f) f.value=em; } if(em || urlRole || _params.get('d')){ setAuthMode('signup'); } })();
async function logout(){await sb.auth.signOut();location.reload();}

async function getProfile(uid){const {data}=await sb.from('profiles').select('*').eq('id',uid).maybeSingle();return data;}

async function enter(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  const {data:{user}}=await sb.auth.getUser();
  if(!user)return;
  const prof=await getProfile(user.id);
  if(!prof){ if(urlRole==='famille'||urlRole==='intervenant'){ setRole(urlRole); } else { chooseRole(); } return; }
  route(prof,user);
}
function chooseRole(){
  document.getElementById('hi').textContent='Bienvenue 👋';
  document.getElementById('body').innerHTML=
    '<div class="empty" style="text-align:left">Pour finaliser votre accès, dites-nous qui vous êtes :</div>'
    +'<div style="display:flex;gap:10px;margin-top:14px">'
    +'<button class="btn" style="flex:1" onclick="setRole(\'famille\')">Je suis une famille</button>'
    +'<button class="btn alt" style="flex:1" onclick="setRole(\'intervenant\')">Je suis intervenant·e</button>'
    +'</div>';
}
async function setRole(role){
  const {data:{user}}=await sb.auth.getUser();
  // crée le profil seulement s'il n'existe pas ; sinon on garde l'existant
  const {error}=await sb.from('profiles').upsert({id:user.id,role},{onConflict:'id',ignoreDuplicates:true});
  if(error && !/duplicate|already exists/i.test(error.message||'')){alert(error.message);return;}
  const prof=await getProfile(user.id);
  route(prof||{id:user.id,role},user);
}
function route(prof,user){
  document.getElementById('hi').textContent='Bonjour'+(prof.prenom?' '+prof.prenom:'')+' 👋';
  if(prof.role==='admin'){document.getElementById('body').innerHTML='<div class="empty" style="text-align:left">Vous êtes connectée en administratrice.</div><a class="go" href="admin.html" style="margin-top:12px">Ouvrir le cockpit →</a>';return;}
  if(prof.role==='intervenant'){return renderIntervenant();}
  return renderFamille();
}

function monthTotal(pts,missionId){
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth()+1;
  return pts.filter(p=>p.mission_id===missionId&&(()=>{const d=new Date(p.date);return d.getFullYear()===y&&(d.getMonth()+1)===mo;})()).reduce((s,p)=>s+p.minutes,0);
}

async function renderFamille(){
  let dParam=new URLSearchParams(location.search).get('d');
  if(!dParam){ try{ dParam=localStorage.getItem('cd_demande'); }catch(e){} }
  if(dParam){ try{ await sb.rpc('claim_demande',{p_id:dParam}); }catch(e){console.error('claim',e);} try{ localStorage.removeItem('cd_demande'); }catch(e){} }
  const [rd,rm,rp,rdec,rc]=await Promise.all([
    sb.from('demandes').select('*').order('created_at',{ascending:false}),
    sb.from('missions').select('*').order('created_at',{ascending:false}),
    sb.from('pointages').select('*'),
    sb.from('declarations').select('*'),
    sb.from('creneaux').select('*')
  ]);
  const demandes=rd.data||[], missions=rm.data||[], pts=rp.data||[], decls=rdec.data||[], creneaux=rc.data||[];
  const _p=new Date(); _p.setDate(1); _p.setMonth(_p.getMonth()-1);
  const PY=_p.getFullYear(), PM=_p.getMonth()+1;
  function prevStatus(mid){
    const its=pts.filter(p=>{const d=new Date(p.date);return p.mission_id===mid&&d.getFullYear()===PY&&(d.getMonth()+1)===PM;});
    if(!its.length) return null;
    if(!its.every(p=>p.statut==='valide')) return 'à valider';
    if(!decls.find(d=>d.mission_id===mid&&d.annee===PY&&d.mois===PM)) return 'à déclarer';
    return 'déclaré';
  }
  const lastD=demandes[0]||null;
  const accepted=missions.find(m=>m.accept==='accepte');
  let step=0;
  if(demandes.length) step=1;
  if(missions.length) step=2;
  if(accepted) step=3;

  let h='';
  // 1) BANDEAU D'ÉTAT
  if(!demandes.length){
    h+='<div class="stat warn"><span class="t">Bienvenue 👋</span>Vous n\'avez pas encore de demande. Dites-nous de quoi vous avez besoin, Chloé s\'occupe du reste.</div>'
      +'<a class="go" href="index.html" style="background:var(--coral);margin-bottom:8px">Faire une demande →</a>';
  } else if(step>=3){
    h+='<div class="stat ok"><span class="t">✅ Vous êtes accompagné·e</span>'+(accepted.intervenant_nom||'Votre intervenant')+' vous accompagne. Retrouvez le suivi des heures ci-dessous.</div>';
  } else if(step===2){
    h+='<div class="stat ok"><span class="t">🟢 Chloé vous a trouvé quelqu\'un</span>La mise en relation est en cours. Chloé vous met en contact très vite.</div>';
  } else {
    h+='<div class="stat warn"><span class="t">🟠 Demande bien reçue</span>Chloé vous rappelle aujourd\'hui. <span id="famCount">Recherche des intervenant·es qui correspondent…</span></div>';
  }

  // 2) FRISE DE SUIVI
  if(demandes.length){
    const labels=['Demande envoyée','Chloé cherche','Intervenant proposé','C\'est parti'];
    h+='<div class="steps">'+labels.map((l,i)=>'<div class="s '+(i<step?'done':'')+(i===step?'cur':'')+'"><div class="dot"></div>'+l+'</div>').join('')+'</div>';
  }

  // 3) À FAIRE (valider les heures)
  const pend=missions.find(m=>{const s=prevStatus(m.id);return s==='à valider'||s==='à déclarer';});
  if(pend){const s=prevStatus(pend.id);
    h+='<h2>À faire</h2><div class="todo"><div class="row"><span class="ic">⏰</span><span class="lab">'+MOIS[PM-1]+' : heures '+s+' pour '+(pend.intervenant_nom||'votre intervenant')+'</span>'
      +'<a href="pointage.html?m='+pend.token+'">'+(s==='à valider'?'Valider':'Déclarer')+'</a></div></div>';
  }

  // 4) MON INTERVENANT / MES MISSIONS
  h+='<h2>Mon accompagnement</h2>';
  if(!missions.length){
    h+='<div class="empty">Dès que Chloé vous propose un intervenant, il apparaîtra ici avec le suivi des heures.</div>';
  } else {
    h+=missions.map(m=>{
      const tot=monthTotal(pts,m.id);
      const montant=m.taux_horaire?(tot/60*Number(m.taux_horaire)).toFixed(2)+' €':'';
      const ps=prevStatus(m.id);
      const psBadge=ps?(' · '+MOIS[PM-1]+' : '+(ps==='déclaré'?'✅ déclaré':ps)):'';
      return '<div class="item"><div class="top"><div class="who">'+(m.intervenant_nom||'—')+'</div></div>'
        +'<div class="badges"><span class="badge '+(m.regime==='pajemploi'?'b-enfants':'b-proche')+'">'+(m.regime==='pajemploi'?'Pajemploi':'CESU')+'</span>'+(m.accept==='accepte'?'<span class="badge b-ok">✅ Confirmé</span>':'')+'</div>'
        +'<div class="meta">Ce mois-ci : <b>'+fmtMin(tot)+'</b>'+(montant?' · '+montant:'')+psBadge+'</div>'
        +'<a class="go" href="pointage.html?m='+m.token+'">Voir / valider les heures →</a></div>';
    }).join('');
  }

  // 4bis) LE PLANNING (semaine type)
  if(creneaux.length){
    const cAnn=creneaux.map(c=>{const m=missions.find(x=>x.id===c.mission_id);return Object.assign({},c,{_name:m?('avec '+(m.intervenant_nom||'votre intervenant')):''});});
    h+='<h2>Le planning</h2>'+planSemaine(cAnn,true);
  }

  // 5) MA DEMANDE
  h+='<h2>Ma demande</h2>';
  if(lastD){
    const st=lastD.statut==='traitee'?'<span class="badge b-ok">Traitée</span>':lastD.statut==='en_cours'?'<span class="badge b-wait">En cours</span>':'<span class="badge b-new">Reçue</span>';
    h+='<div class="item"><div class="badges" style="margin-bottom:6px"><span class="badge '+(lastD.type==='enfants'?'b-enfants':'b-proche')+'">'+(lastD.type==='enfants'?'Garde d\'enfants':'Aide à un proche')+'</span>'+st+'</div>'
      +'<div class="meta">📍 '+(lastD.commune||'-')+'</div></div>';
  }
  h+='<a class="go ghost" href="index.html" style="background:#fff;color:var(--forest);border:1.5px solid var(--line);margin-top:4px">Faire une autre demande →</a>';

  // 6) MES DÉMARCHES
  if(lastD){
    const enfants=lastD.type==='enfants';
    h+='<h2>Mes démarches</h2><div class="item"><div class="who">'+(enfants?'🍼 Pajemploi':'🏠 CESU')+'</div>'
      +'<div class="meta" style="margin-top:6px">'
      +(enfants
        ? 'Vous employez votre intervenant·e via <b>Pajemploi</b>. Chaque mois, vous déclarez ses heures (quelques clics). Selon votre situation, vous pouvez bénéficier du <b>CMG</b> et d\'un <b>crédit d\'impôt</b>.'
        : 'Vous employez votre intervenant·e via le <b>CESU</b> (URSSAF). Chaque mois, vous déclarez ses heures (quelques clics) et vous récupérez <b>50% en crédit d\'impôt</b>.')
      +'</div><div class="meta" style="margin-top:6px">Pas d\'inquiétude : au moment de valider les heures, on vous guide pas à pas.</div></div>';
  }

  document.getElementById('body').innerHTML=h;
  if(step===1 && lastD) loadFamCount(lastD.id, lastD);
}
async function loadFamCount(demandeId, d){
  const el=document.getElementById('famCount'); if(!el)return;
  let n=null;
  try{ const {data,error}=await sb.functions.invoke('match',{body:{demande_id:demandeId}}); if(!error && data && Array.isArray(data.matches)) n=data.matches.length; }catch(e){}
  if(n===null){ try{ const {data}=await sb.rpc('count_matchs',{p_commune:(d&&d.commune)||'',p_type:(d&&d.type)||'proche'}); if(typeof data==='number') n=data; }catch(e){} }
  if(n && n>0){ el.innerHTML='<b>'+n+' intervenant·e'+(n>1?'s':'')+'</b> de notre réseau correspond'+(n>1?'ent':'')+' à votre besoin — Chloé les contacte dès maintenant.'; }
  else { el.textContent='Chloé recherche la bonne personne pour vous et revient vers vous très vite.'; }
}

async function renderIntervenant(){
  const {data:{user}}=await sb.auth.getUser();
  try{ await sb.rpc('claim_intervenant'); }catch(e){}
  const [ri,rm,rp,rc,rdi]=await Promise.all([
    sb.from('intervenants').select('*').eq('user_id',user.id).maybeSingle(),
    sb.from('missions').select('*').order('created_at',{ascending:false}),
    sb.from('pointages').select('*'),
    sb.from('creneaux').select('*'),
    sb.from('dispos').select('*')
  ]);
  const prof=ri.data; myInterv=prof; const missions=rm.data||[], pts=rp.data||[], creneaux=rc.data||[], dispos=rdi.data||[];
  if(!prof){
    document.getElementById('body').innerHTML='<div class="empty" style="text-align:left">Aucune fiche intervenant n\'est associée à cet email.<br>Inscrivez-vous via le site (bouton « Rejoindre le réseau »), en utilisant <b>le même email</b> que ce compte.</div><a class="go" href="index.html" style="margin-top:12px">Aller au site →</a>';
    return;
  }
  const esc=s=>(s||'').replace(/"/g,'&quot;');
  const validated=prof.statut==='valide', refused=prof.statut==='refuse', needCasier=!prof.casier_ok;
  const casB=prof.casier_ok?'<span class="badge b-ok">🛡️ Casier vérifié</span>':'<span class="badge b-wait">Casier à fournir</span>';
  const _p=new Date(); _p.setDate(1); _p.setMonth(_p.getMonth()-1);
  const PY=_p.getFullYear(), PM=_p.getMonth()+1;
  const curStart=new Date(); curStart.setDate(1); curStart.setHours(0,0,0,0);
  function prevStatusI(mid){
    const its=pts.filter(p=>{const d=new Date(p.date);return p.mission_id===mid&&d.getFullYear()===PY&&(d.getMonth()+1)===PM;});
    if(!its.length) return 'à saisir';
    if(!its.every(p=>p.statut==='valide')) return 'en attente de validation';
    return 'validé';
  }
  function missionItem(m){
    const tot=monthTotal(pts,m.id); const ps=prevStatusI(m.id);
    const accBadge=m.accept==='accepte'?'<span class="badge b-ok">✅ Acceptée</span>':m.accept==='refuse'?'<span class="badge b-wait">Refusée</span>':'<span class="badge b-new">À répondre</span>';
    const accBtns=(!m.accept&&validated)?'<div style="display:flex;gap:8px;margin-top:8px"><button class="btn" style="flex:1" onclick="acceptM(\''+m.id+'\',\'accepte\')">J\'accepte</button><button class="btn ghost" style="flex:1" onclick="acceptM(\''+m.id+'\',\'refuse\')">Je ne peux pas</button></div>':'';
    return '<div class="item"><div class="top"><div class="who">'+(m.famille_prenom||'—')+'</div></div>'
      +'<div class="badges">'+accBadge+(m.taux_horaire?' <span class="badge b-ok">'+Number(m.taux_horaire).toFixed(2)+' €/h</span>':'')+'</div>'
      +'<div class="meta">Ce mois-ci : <b>'+fmtMin(tot)+'</b> · '+MOIS[PM-1]+' : '+(ps==='validé'?'✅ validé':ps)+'</div>'
      +accBtns
      +'<a class="go" href="pointage.html?m='+m.token+'">Pointer mes heures →</a></div>';
  }
  let earn=0, monthMin=0; missions.forEach(m=>{ const t=monthTotal(pts,m.id); monthMin+=t; if(m.taux_horaire){ earn+=t/60*Number(m.taux_horaire); } });
  const proposed=missions.filter(m=>!m.accept);
  const pendI=missions.find(m=>new Date(m.created_at)<curStart && prevStatusI(m.id)==='à saisir');

  let h='';
  // 1) BANDEAU D'ÉTAT
  if(refused){ h+='<div class="stat warn"><span class="t">Profil non retenu</span>N\'hésitez pas à contacter Chloé pour en savoir plus.</div>'; }
  else if(validated){ h+='<div class="stat ok"><span class="t">✅ Profil validé</span>Vous êtes visible auprès des familles et pouvez recevoir des missions.</div>'; }
  else if(needCasier){ h+='<div class="stat warn"><span class="t">⏳ Profil presque prêt</span>Il manque votre <b>casier (bulletin n°3)</b> pour être proposé·e aux familles. C\'est gratuit et rapide.</div>'; }
  else { h+='<div class="stat warn"><span class="t">⏳ En attente de validation</span>Votre dossier est complet. Chloé vérifie votre profil — vous serez prévenu·e dès qu\'il est validé.</div>'; }

  // 2) À FAIRE
  const todo=[];
  if(needCasier) todo.push('<div class="row"><span class="ic">🛡️</span><span class="lab">Demander mon casier judiciaire (bulletin n°3)</span><a href="https://casier-judiciaire.justice.gouv.fr/" target="_blank" rel="noopener">Faire ma demande</a></div>');
  if(validated && proposed.length) todo.push('<div class="row"><span class="ic">📩</span><span class="lab">'+proposed.length+' mission'+(proposed.length>1?'s':'')+' à accepter ou refuser</span><button onclick="document.getElementById(\'msec\').scrollIntoView({behavior:\'smooth\'})">Voir</button></div>');
  if(pendI) todo.push('<div class="row"><span class="ic">⏰</span><span class="lab">Saisir mes heures de '+MOIS[PM-1]+' ('+(pendI.famille_prenom||'famille')+')</span><a href="pointage.html?m='+pendI.token+'">Saisir</a></div>');
  h+='<h2>À faire</h2>';
  h+= todo.length ? '<div class="todo">'+todo.join('')+'</div>' : '<div class="empty">Tout est à jour ✅ Rien à faire pour le moment.</div>';

  // 3) GAINS
  h+='<div class="gaincard"><div class="meta" style="color:#cfe3dc">Mes heures ce mois-ci</div>'
    +'<div style="font-size:1.7rem;font-weight:800;margin-top:2px">'+fmtMin(monthMin)+'</div>'
    +(earn>0?'<div style="margin-top:2px;color:#cfe3dc">≈ '+earn.toFixed(2)+' € net estimés</div>':'<div style="margin-top:2px;color:#cfe3dc">Vos gains s\'afficheront ici dès vos premières heures.</div>')
    +'</div>';

  // 3bis) MES DISPONIBILITÉS (l'intervenant déclare quand il peut)
  h+='<h2>Mes disponibilités</h2>';
  h+='<div style="font-size:.86rem;color:var(--muted);margin-bottom:8px">Indiquez quand vous êtes disponible. Les familles s\'en servent pour vous proposer des créneaux.</div>';
  const dsorted=dispos.slice().sort((a,b)=>(a.jour-b.jour)||a.debut.localeCompare(b.debut));
  if(dsorted.length){ h+=dsorted.map(d=>'<div class="cre"><span>'+JOURS[d.jour]+' · '+fmtH(d.debut)+'–'+fmtH(d.fin)+'</span><button title="Retirer" onclick="delDispo(\''+d.id+'\')">✕</button></div>').join(''); }
  h+='<div class="dispo-add"><select id="dj">'+[1,2,3,4,5,6,7].map(j=>'<option value="'+j+'">'+JOURS[j]+'</option>').join('')+'</select><input id="dd" type="time" value="09:00"><input id="df" type="time" value="12:00"><button onclick="addDispo()">+ Ajouter</button></div>';

  // 3ter) MON PLANNING (créneaux confirmés avec les familles)
  if(validated){
    const cAnn=creneaux.map(c=>{const m=missions.find(x=>x.id===c.mission_id);return Object.assign({},c,{_name:m?('chez '+(m.famille_prenom||'famille')):''});});
    h+='<h2>Mon planning</h2>'+planSemaine(cAnn,true);
  }

  // 4) MISSIONS (floutées si non validé)
  h+='<h2 id="msec">Mes missions</h2>';
  let mHtml = missions.length ? missions.map(missionItem).join('')
    : '<div class="empty">Vos missions apparaîtront ici dès que Chloé vous en attribue.</div>';
  if(validated){ h+=mHtml; }
  else{
    const ghost = missions.length ? mHtml
      : '<div class="item"><div class="who">Mission près de chez vous</div><div class="meta">•••••••• · ••h••</div></div><div class="item"><div class="who">Mission près de chez vous</div><div class="meta">•••••••• · ••h••</div></div>';
    h+='<div class="lockwrap"><div class="blur">'+ghost+'</div>'
      +'<div class="lockmsg"><span class="em">🔒</span><div style="font-weight:800;color:var(--forest)">Vos missions se débloquent après validation</div>'
      +'<div class="meta">'+(needCasier?'Ajoutez votre casier pour être validé·e.':'Chloé valide votre profil très vite.')+'</div></div></div>';
  }

  // 5) MON PROFIL (repliable)
  h+='<details class="prof"><summary>Mon profil</summary><div style="padding-bottom:12px">'
    +'<label>Communes où j\'interviens</label><input id="e_zone" value="'+esc(prof.zone)+'">'
    +'<label>Spécialités</label><input id="e_spe" value="'+esc(prof.specialites)+'">'
    +'<label>Années d\'expérience</label><input id="e_exp" type="number" value="'+(prof.experience!=null?prof.experience:'')+'">'
    +'<label>Quelques mots sur moi (vu par les familles)</label><textarea id="e_bio" rows="3" style="width:100%;font-family:inherit;font-size:1rem;padding:11px;border:1.5px solid var(--line);border-radius:11px" placeholder="Ex. Auxiliaire de vie depuis 8 ans, douce et patiente…">'+esc(prof.bio)+'</textarea>'
    +'<button class="btn" style="margin-top:4px" onclick="saveInterv()">Enregistrer</button>'
    +'<div class="msg" id="e_msg"></div>'
    +'</div></details>';

  // 6) MES PAPIERS
  h+='<h2>Mes papiers</h2>';
  h+='<div class="item"><div class="who">🛡️ Casier judiciaire (bulletin n°3)</div>'
    +'<div class="badges" style="margin-top:6px">'+casB+'</div>'
    +(needCasier
      ? '<div class="meta" style="margin-top:6px">Gratuit, souvent en moins d\'une heure en ligne si vous êtes né·e en France.</div><a class="go" href="https://casier-judiciaire.justice.gouv.fr/" target="_blank" rel="noopener" style="background:var(--forest)">Faire ma demande →</a>'
      : '<div class="meta" style="margin-top:6px">Casier vérifié ✅ Rien à faire.</div>')
    +'</div>';
  h+='<div class="item"><div class="who">🧾 Mes déclarations</div><div class="meta" style="margin-top:6px">Une fois vos heures validées par la famille, vous déclarez en un clic depuis le récap de pointage (CESU / Pajemploi). Le lien apparaît sur chaque mission.</div></div>';

  document.getElementById('body').innerHTML=h;
}
async function saveInterv(){
  if(!myInterv)return;
  const upd={zone:document.getElementById('e_zone').value.trim(),specialites:document.getElementById('e_spe').value.trim(),experience:parseInt(document.getElementById('e_exp').value)||null,bio:document.getElementById('e_bio').value.trim()};
  const {error}=await sb.from('intervenants').update(upd).eq('id',myInterv.id);
  const m=document.getElementById('e_msg');
  if(error){m.className='msg err';m.textContent=error.message;return;}
  m.className='msg ok';m.textContent='Enregistré ✅';
}
window.addDispo=async()=>{
  if(!myInterv)return;
  const jour=parseInt(document.getElementById('dj').value,10);
  const debut=document.getElementById('dd').value, fin=document.getElementById('df').value;
  if(!debut||!fin){alert('Indiquez une heure de début et de fin.');return;}
  if(fin<=debut){alert('La fin doit être après le début.');return;}
  const {error}=await sb.from('dispos').insert({intervenant_id:myInterv.id,jour,debut,fin});
  if(error){alert(error.message);return;}
  renderIntervenant();
};
window.delDispo=async(id)=>{ const {error}=await sb.from('dispos').delete().eq('id',id); if(error){alert(error.message);return;} renderIntervenant(); };
window.acceptM=async(id,val)=>{
  if(val==='refuse' && !confirm('Indiquer que tu ne peux pas prendre cette mission ?'))return;
  const {error}=await sb.rpc('accept_mission',{p_id:id,p_accept:val});
  if(error){alert('Erreur : '+error.message);return;}
  renderIntervenant();
};

// Détecte la connexion (y compris au retour du lien magique)
sb.auth.onAuthStateChange(async(_e,session)=>{
  if(_e==='PASSWORD_RECOVERY'){
    const np=prompt('Choisissez un nouveau mot de passe (6 caractères minimum) :');
    if(np&&np.length>=6){ const {error}=await sb.auth.updateUser({password:np}); if(error){alert(error.message);return;} alert('Mot de passe mis à jour ✅'); enter(); }
    else if(np!==null){ alert('Mot de passe trop court (6 caractères minimum).'); }
    return;
  }
  if(session && document.getElementById('app').style.display!=='block') enter();
});
(async()=>{ const {data:{session}}=await sb.auth.getSession(); if(session) enter(); })();
</script>
